<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="">Body Mass Index (BMI) Caluclator</h1>
        Height (cm):
        <input id="height" class="input" type="number" value = "180" placeholder="Enter Height"><br>
        Weight (kg):
        <input id="weight" class="input" type="number" value = "80" placeholder="Enter Weight"><br>
        <button id="btn" class="btn">Compute BMI</button><br>
        <input id="bmi-result" class="input" disabled type="number" value="" placeholder=""><br>
        <p class="info-text">Weight Condition: <span id ="weight-condition"></span></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
